{% set name = "pytorch-model-summary" %}
{% set version = "0.1.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pytorch_model_summary-{{ version }}.tar.gz
  sha256: a24f2de5d6f08cbf8a19e88a6e80982f904aa27fb791522a9fbec23098dd7027

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - numpy
    - python >={{ python_min }}
    - pytorch
    - tqdm

test:
  imports:
    - pytorch_model_summary
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/amarczew/pytorch_model_summary
  summary: It is a Keras style model.summary() implementation for PyTorch
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fishbotics
